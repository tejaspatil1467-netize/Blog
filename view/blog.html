<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — DevSync</title>
  <meta name="description" content="" id="page-meta-desc" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23111827'/><text x='6' y='23' font-family='monospace' font-size='20' fill='white'>D</text></svg>" />
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────────────── -->
<nav class="navbar" role="navigation" aria-label="Main navigation">
  <div class="container">

    <a class="nav-logo" href="home.html" aria-label="DevSync Home">
      <div class="logo-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 6h16M4 12h10M4 18h14" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <span class="logo-text">TechSync</span>
    </a>

    <div class="nav-actions">
      <button class="btn-icon" id="theme-toggle" aria-label="Toggle dark mode"></button>

      <a href="write.html" class="btn btn-ghost" aria-label="Write a blog">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        Write
      </a>

      <a href="login.html" class="btn btn-primary" aria-label="Login">Sign In</a>
    </div>

  </div>
</nav>

<!-- ── Blog Detail ─────────────────────────────────────────────────── -->
<main class="blog-detail-page fade-in" id="main-content">

  <!-- Back Button -->
  <button class="blog-back" onclick="history.back()" aria-label="Go back">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
    </svg>
    Back to blogs
  </button>

  <!-- Tags -->
  <div class="blog-detail-tags" id="blog-tags" aria-label="Blog tags"></div>

  <!-- Title -->
  <h1 class="blog-detail-title" id="blog-title">Loading…</h1>

  <!-- Author Row -->
  <div class="author-row" role="contentinfo" aria-label="Author info">
    <div class="avatar lg" id="blog-author-avatar-el" aria-hidden="true">—</div>
    <div class="author-info">
      <h4 id="blog-author-name">—</h4>
      <p id="blog-author-bio">—</p>
    </div>
    <div class="author-meta">
      <span id="blog-date">—</span>
      <span id="blog-read-time">—</span>
    </div>
  </div>

  <!-- Content -->
  <article class="blog-content" id="blog-content" aria-label="Blog content">
    <!-- Populated by JS -->
  </article>

  <!-- Like Section -->
  <div class="like-section" aria-label="Like this post">
    <button class="btn-like" id="like-btn" aria-label="Like this post" aria-pressed="false">
      <svg class="heart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <span id="like-count">0</span> Likes
    </button>
    <span class="like-count-text" id="like-count-text"></span>
  </div>

</main>

<!-- ── Related Posts ───────────────────────────────────────────────── -->
<section style="background: var(--bg-secondary); padding: 48px 0; margin-top: 0;" aria-label="Related posts">
  <div class="container">
    <h2 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 24px; letter-spacing: -0.02em;">
      More articles you might like
    </h2>
    <div class="blog-grid" id="related-grid"></div>
  </div>
</section>

<!-- ── Footer ───────────────────────────────────────────────────────── -->
<footer class="site-footer" role="contentinfo">
  <div class="container">
    <div class="footer-links">
      <a href="home.html">Home</a>
      <a href="write.html">Write</a>
      <a href="login.html">Sign In</a>
    </div>
    <p>© 2026 DevSync — A space for developers to learn and share.</p>
  </div>
</footer>

<script src="../model/data.js"></script>
<script src="../controller/app.js"></script>
</body>
</html>
