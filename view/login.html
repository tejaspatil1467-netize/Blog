<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — TechSync</title>
  <meta name="description" content="Sign in to TechSync to read, write, and connect with thousands of developers." />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23111827'/><text x='6' y='23' font-family='monospace' font-size='20' fill='white'>D</text></svg>" />
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────────────── -->
<nav class="navbar" role="navigation" aria-label="Main navigation">
  <div class="container">

    <a class="nav-logo" href="home.html" aria-label="TechSync">
      <div class="logo-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 6h16M4 12h10M4 18h14" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <span class="logo-text">TechSync</span>
    </a>

    <div class="nav-actions">
      <button class="btn-icon" id="theme-toggle" aria-label="Toggle dark mode"></button>
      <a href="home.html" class="btn btn-ghost">← Back</a>
    </div>

  </div>
</nav>

<!-- ── Auth Page ────────────────────────────────────────────────────── -->
<main class="auth-page" id="main-content">

  <div class="auth-card fade-up">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon" style="width:44px;height:44px;" aria-hidden="true">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 6h16M4 12h10M4 18h14" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your TechSync account</p>

    <!-- Login Form -->
    <form class="auth-form" id="login-form" aria-label="Login form" novalidate>

      <div class="form-group">
        <label class="form-label" for="email-input">Email</label>
        <div class="form-input-group">
          <span class="input-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </span>
          <input
            type="email"
            id="email-input"
            class="form-input"
            placeholder="you@example.com"
            autocomplete="email"
            required
            aria-required="true"
          />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password-input">Password</label>
        <div class="form-input-group" style="position:relative;">
          <span class="input-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input
            type="password"
            id="password-input"
            class="form-input"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
            aria-required="true"
          />
          <button type="button" class="toggle-password" id="toggle-password" aria-label="Show password">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" id="remember-me" />
          Remember me
        </label>
        <a href="#" class="forgot-link" onclick="return false">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="login-btn" aria-label="Sign in">
        Sign In
      </button>

    </form>

    <!-- Divider -->
    <div class="divider" style="margin: 20px 0;">or continue with</div>

    <!-- Social -->
    <div class="social-btns">
      <button type="button" class="btn-social" id="github-btn" aria-label="Continue with GitHub">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.107-.776.418-1.305.762-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
        </svg>
        GitHub
      </button>

      <button type="button" class="btn-social" id="google-btn" aria-label="Continue with Google">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google
      </button>
    </div>

    <p class="auth-footer">
      Don't have an account?
      <a href="#" onclick="return false">Create one for free</a>
    </p>

  </div>

</main>

<!-- ── Footer ───────────────────────────────────────────────────────── -->
<footer class="site-footer" role="contentinfo">
  <div class="container">
    <p>
      By signing in, you agree to DevSync's
      <a href="#" onclick="return false" style="color:var(--link)">Terms</a> and
      <a href="#" onclick="return false" style="color:var(--link)">Privacy Policy</a>.
    </p>
  </div>
</footer>

<script src="../model/data.js"></script>
<script src="../controller/app.js"></script>
</body>
</html>
