<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Write — DevSync</title>
  <meta name="description" content="Share your knowledge with the developer community. Write your next technical article on DevSync." />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23111827'/><text x='6' y='23' font-family='monospace' font-size='20' fill='white'>D</text></svg>" />
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────────────── -->
<nav class="navbar" role="navigation" aria-label="Main navigation">
  <div class="container">

    <a class="nav-logo" href="home.html" aria-label="DevSync Home">
      <div class="logo-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 6h16M4 12h10M4 18h14" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <span class="logo-text">DevSync</span>
    </a>

    <div class="nav-actions">
      <button class="btn-icon" id="theme-toggle" aria-label="Toggle dark mode"></button>
      <a href="home.html" class="btn btn-ghost">← Feed</a>
      <a href="login.html" class="btn btn-primary">Sign In</a>
    </div>

  </div>
</nav>

<!-- ── Write Page ───────────────────────────────────────────────────── -->
<main class="write-page fade-up" id="main-content">

  <div class="write-header">
    <h1>Write a New Article</h1>
    <p>Share your knowledge with 10,000+ developers on DevSync.</p>
  </div>

  <form class="write-form" id="write-form" aria-label="Write blog form" novalidate>

    <!-- Title -->
    <div class="form-group">
      <label class="form-label" for="title-input">Article Title *</label>
      <input
        type="text"
        id="title-input"
        class="form-input title-input"
        placeholder="What's your article about?"
        maxlength="120"
        required
        aria-required="true"
      />
    </div>

    <!-- Excerpt -->
    <div class="form-group">
      <label class="form-label" for="excerpt-input">
        Short Description
        <span id="excerpt-count" style="font-weight:400; color: var(--text-muted); margin-left: 8px;">0/160</span>
      </label>
      <input
        type="text"
        id="excerpt-input"
        class="form-input"
        placeholder="A brief summary that appears on the blog card (max 160 chars)"
        maxlength="160"
      />
    </div>

    <!-- Author & Read Time -->
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="author-input">Author Name</label>
        <input
          type="text"
          id="author-input"
          class="form-input"
          placeholder="Your name"
        />
      </div>
      <div class="form-group">
        <label class="form-label" for="readtime-input">Read Time</label>
        <input
          type="text"
          id="readtime-input"
          class="form-input"
          placeholder="e.g. 5 min read"
        />
      </div>
    </div>

    <!-- Tags -->
    <div class="form-group">
      <label class="form-label" for="tag-input">
        Tags
        <span style="font-weight:400; color: var(--text-muted); margin-left: 8px;">(up to 5, press Enter or comma)</span>
      </label>
      <div class="tags-input-wrapper" id="tags-input-wrapper">
        <span id="tag-chips"></span>
        <input
          type="text"
          id="tag-input"
          class="tags-input-field"
          placeholder="Java, React, AI…"
          aria-label="Add tags"
        />
      </div>
    </div>

    <!-- Content with Toolbar -->
    <div class="form-group">
      <label class="form-label">Content *</label>

      <div class="editor-toolbar" role="toolbar" aria-label="Formatting toolbar">
        <button type="button" class="toolbar-btn" data-action="h2" title="Heading 2" aria-label="Insert H2">H2</button>
        <button type="button" class="toolbar-btn" data-action="h3" title="Heading 3" aria-label="Insert H3">H3</button>
        <div class="toolbar-divider" role="separator"></div>
        <button type="button" class="toolbar-btn" data-action="bold" title="Bold" aria-label="Bold"><strong>B</strong></button>
        <button type="button" class="toolbar-btn" data-action="italic" title="Italic" aria-label="Italic"><em>I</em></button>
        <div class="toolbar-divider" role="separator"></div>
        <button type="button" class="toolbar-btn" data-action="code" title="Inline code" aria-label="Inline code">`</button>
        <button type="button" class="toolbar-btn" data-action="codeblock" title="Code block" aria-label="Code block">{ }</button>
        <div class="toolbar-divider" role="separator"></div>
        <button type="button" class="toolbar-btn" data-action="link" title="Link" aria-label="Insert link">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
        </button>
      </div>

      <textarea
        id="content-input"
        class="form-textarea content-textarea"
        placeholder="Write your article here... You can use Markdown formatting.

## Introduction
Start with a hook that grabs the reader's attention.

## Main Content
Dive deep with examples, code snippets, and clear explanations.

## Conclusion
Summarize key takeaways."
        aria-label="Article content"
        required
        aria-required="true"
      ></textarea>
    </div>

    <!-- Publish Bar -->
    <div class="publish-bar" role="region" aria-label="Publish actions">
      <p>
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:-2px;margin-right:4px;">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Supports Markdown formatting. Preview coming soon.
      </p>
      <button type="button" class="btn-publish" id="publish-btn" aria-label="Publish article">
        Publish Article →
      </button>
    </div>

  </form>

</main>

<!-- ── Footer ───────────────────────────────────────────────────────── -->
<footer class="site-footer" role="contentinfo">
  <div class="container">
    <div class="footer-links">
      <a href="home.html">Home</a>
      <a href="login.html">Sign In</a>
    </div>
    <p>© 2026 DevSync — A space for developers to learn and share.</p>
  </div>
</footer>

<!-- Toast Notification -->
<div class="toast" id="toast" role="alert" aria-live="polite">
  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
  Article published! (UI demo — no backend)
</div>

<script src="../model/data.js"></script>
<script src="../controller/app.js"></script>
</body>
</html>
