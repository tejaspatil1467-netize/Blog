<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechSync — A Blog for Developers</title>
  <meta name="description" content="Discover high-quality articles on Java, React, AI, DevOps, System Design and more — written by developers, for developers." />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23111827'/><text x='6' y='23' font-family='monospace' font-size='20' fill='white'>D</text></svg>" />
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────────────── -->
<nav class="navbar" role="navigation" aria-label="Main navigation">
  <div class="container">

    <a class="nav-logo" href="home.html" id="logo-link" aria-label="DevSync Home">
      <div class="logo-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 6h16M4 12h10M4 18h14" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <span class="logo-text">TechSync</span>
    </a>

    <div class="nav-search" role="search">
      <span class="search-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <input type="search" id="nav-search" placeholder="Search articles, tags, authors…"
             aria-label="Search blogs" autocomplete="off" />
    </div>

    <div class="nav-actions">
      <button class="btn-icon" id="theme-toggle" aria-label="Toggle dark mode"></button>

      <a href="write.html" class="btn btn-ghost" id="write-btn" aria-label="Write a blog">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        Write
      </a>

      <a href="login.html" class="btn btn-primary" id="login-btn-nav" aria-label="Login to your account">
        Sign In
      </a>
    </div>

  </div>
</nav>

<!-- ── Hero ────────────────────────────────────────────────────────── -->
<section class="hero fade-up" aria-label="Hero section">
  <div class="container">
    <div class="hero-label">
      <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
      </svg>
      Built for developers
    </div>
    <h1>Ideas Worth <span>Reading</span></h1>
    <p>Curated articles on Java, React, AI, DevOps, and System Design — written by engineers who ship.</p>
  </div>
</section>

<!-- ── Tag Filter ───────────────────────────────────────────────────── -->
<div class="tag-filter-bar" role="navigation" aria-label="Filter by topic">
  <div class="container" id="tag-filter-bar"></div>
</div>

<!-- ── Blog Grid ────────────────────────────────────────────────────── -->
<main class="blog-grid-section" id="main-content">
  <div class="container">
    <div class="blog-grid" id="blog-grid" aria-label="Blog posts" role="list">
      <!-- Cards rendered by JavaScript -->
    </div>
  </div>
</main>

<!-- ── Footer ───────────────────────────────────────────────────────── -->
<footer class="site-footer" role="contentinfo">
  <div class="container">
    <div class="footer-links">
      <a href="home.html">Home</a>
      <a href="write.html">Write</a>
      <a href="login.html">Sign In</a>
      <a href="#" onclick="return false">About</a>
      <a href="#" onclick="return false">Privacy</a>
    </div>
    <p>© 2026 DevSync — A space for developers to learn and share.</p>
  </div>
</footer>

<script src="../model/data.js"></script>
<script src="../controller/app.js"></script>
</body>
</html>
